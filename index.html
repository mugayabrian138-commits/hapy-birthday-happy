<!-- ======= PAGE 2 ======= -->
<div class="page" id="page2">
  <div class="steps">
    <div class="step-dot done"></div>
    <div class="step-line done"></div>
    <div class="step-dot active" id="s2b"></div>
    <div class="step-line" id="l2b"></div>
    <div class="step-dot" id="s3b"></div>
  </div>

  <div class="card">
    <div class="card-glow glow-1" style="background:var(--accent3)"></div>
    <div class="card-glow glow-2"></div>

    <div class="gif-wrap">
      <img src="dog side eye.jpg" alt="">
    </div>

    
    <h1 class="page-title">Mhhm... prove it.</h1>
    <p class="page-sub">
      Cool name. But how do I <strong>really</strong> know it's you?<br>
      Enter your birthday below. You know the one. 🎂
    </p>

    <input
      class="input-field"
      id="dateInput"
      type="date"
    />
    <div class="error-msg" id="dateError">
      🤨 That's not the right date... nice try though.
    </div>
    <p class="hint">DD / MM / YYYY</p>
    <button class="btn-next" onclick="checkDate()">That's my birthday →</button>
  </div>
</div>
